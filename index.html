<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Free Online Tools — Calculator, Converter, Generator</title>
<meta name="description" content="Collection of 0+ free online tools: calculators, converters, generators. No signup, no ads clutter, just useful tools.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;max-width:800px;margin:0 auto;padding:2rem 1rem;color:#1a1a2e;line-height:1.6}
h1{font-size:1.8rem;margin-bottom:0.5rem}
.subtitle{color:#666;margin-bottom:2rem}
h2{font-size:1.2rem;margin:1.5rem 0 0.8rem;color:#444;border-bottom:1px solid #eee;padding-bottom:0.3rem}
.tool-list{list-style:none}
.tool-list li{margin:0.6rem 0}
.tool-list a{color:#2563eb;text-decoration:none;font-weight:500}
.tool-list a:hover{text-decoration:underline}
.tool-list .desc{color:#666;font-size:0.9rem}
</style>
</head>
<body>
<h1>Free Online Tools</h1>
<p class="subtitle">0 free tools — no signup, no clutter.</p>

<div id="email-capture" style="margin:2rem 0;padding:1.5rem;background:#f0f4ff;border-radius:8px;text-align:center;">
<p style="margin-bottom:0.8rem;">Get new tools weekly</p>
<form id="email-form" onsubmit="return captureEmail(event)" style="display:flex;gap:8px;justify-content:center;">
<input type="email" placeholder="your@email.com" required style="padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;">
<button type="submit" style="padding:8px 16px;background:#2563eb;color:white;border:none;border-radius:6px;cursor:pointer;">Subscribe</button>
</form>
</div>
<script>
function captureEmail(e){e.preventDefault();const email=e.target.querySelector('input').value;
fetch('__NEWSLETTER_ENDPOINT__',{method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({email,source:'index'})}).then(()=>{e.target.innerHTML='<p style="color:green">Subscribed!</p>';});return false;}
</script>
</body></html>
