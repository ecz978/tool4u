function getCategory(slug) {
  var s = slug.toLowerCase();
  for (var i = 0; i < CATEGORIES.length; i++) {
    for (var j = 0; j < CATEGORIES[i].keys.length; j++) {
      if (s.indexOf(CATEGORIES[i].keys[j]) !== -1) return CATEGORIES[i].id;
    }
  }
  return 'altro';
}

var currentLang = 'it';
var currentCat = 'all';

function setLang(lang, btn) {
  currentLang = lang;
  currentCat = 'all';
  document.querySelectorAll('.lang-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderCats();
  renderGrid();
}

function setCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderGrid();
}

function catLabel(id) {
  var map = CAT_LABELS[id];
  if (!map) return id;
  return map[currentLang] || map['en'] || id;
}

function renderCats() {
  var items = articles[currentLang] || [];
  var present = {};
  items.forEach(function(a){ present[getCategory(a.slug)] = true; });

  var html = '<button class="cat-btn active" onclick="setCat(\'all\',this)">'+catLabel('all')+'</button>';
  CATEGORIES.forEach(function(c){
    if (present[c.id]) {
      html += '<button class="cat-btn" onclick="setCat(\''+c.id+'\',this)">'+catLabel(c.id)+'</button>';
    }
  });
  document.getElementById('cats').innerHTML = html;
}

function renderGrid() {
  var q = document.getElementById('search').value.toLowerCase();
  var items = articles[currentLang] || [];
  var html = '';
  items.forEach(function(a) {
    if (a.slug === 'index.html') return;
    var cat = getCategory(a.slug);
    if (currentCat !== 'all' && cat !== currentCat) return;
    if (q && a.title.toLowerCase().indexOf(q) === -1) return;
    var catLab = catLabel(cat);
    html += '<a class="card" href="/blog/'+currentLang+'/'+a.slug+'">';
    if (catLab) html += '<span class="cat-tag">'+catLab+'</span>';
    html += '<h3>'+a.title+'</h3></a>';
  });
  document.getElementById('grid').innerHTML = html || '<p style="color:#64748b;padding:2rem">Nessun articolo trovato</p>';
}

renderCats();
renderGrid();
